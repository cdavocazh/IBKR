# IBC Configuration for IB Gateway
# Note: With non-CUSTOM_CONFIG, the image's template generates the main config.
# This file is mounted to /root/ibc/ for reference.
LogToConsole=yes

# Credentials loaded from docker-compose environment
IbLoginId=
IbPassword=

# 2FA — reclaim session automatically when kicked by mobile app login
ExistingSessionDetectedAction=primary
AcceptIncomingConnectionAction=accept

# Auto-restart (soft restart, keeps session, no re-auth)
AutoRestartTime=23:45

# Sunday cold restart (full re-auth required — triggers IBKR Mobile 2FA)
ColdRestartTime=05:00

# If 2FA times out, restart and retry
ExitAfterSecondFactorAuthenticationTimeout=yes
SecondFactorAuthenticationExitInterval=60

# Read-only API access
ReadOnlyLogin=yes
